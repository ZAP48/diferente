<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Melancholy Love - Admin App</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* --- TEMA CUTE & EMO (Pastel Goth / Punk Neobrutalism) --- */
    :root {
      --color-melancholy-love: #FF69B4; 
      --color-love: #E60000;            
      --color-melancholy: #8A2BE2;      
      
      --primary: var(--color-melancholy-love); 
      --primary-light: #FFB6C1;     
      --black: #111111; 
      --white: #ffffff; 
      --bg: #FFF0F5;
      
      --border: 3px solid var(--black); 
      --border-dashed: 3px dashed var(--black);
      --shadow: 5px 5px 0px var(--black); 
      --shadow-sm: 3px 3px 0px var(--black);
      --radius: 0px; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    body { 
      background-color: var(--bg); 
      background-image: linear-gradient(var(--primary-light) 1px, transparent 1px), linear-gradient(90deg, var(--primary-light) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--black); 
      font-family: 'Roboto', sans-serif; 
      padding-bottom: 90px; 
      overflow-x: hidden; 
      transition: background-color 0.3s ease;
    }
    
    h1, h2, h3, h4, .font-head { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; font-style: italic; }

    .header { background: var(--black); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; transition: border-color 0.3s;}
    .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.1rem; color: var(--white); letter-spacing: -1px; }
    .logo span { background: var(--primary); color: var(--black); padding: 2px 6px; margin-left: 5px; font-style: normal; transform: rotate(-3deg); display: inline-block; transition: 0.3s;}
    
    .container { padding: 0 15px; max-width: 600px; margin: 0 auto; }
    .view-section { display: none; padding-top: 20px; }
    .view-section.active { display: block; animation: slideIn 0.2s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    /* EFEITOS ESPECIAIS DE FLASH */
    @keyframes flash-melancholy { 0% { background-color: var(--color-melancholy); } 100% { background-color: var(--bg); } }
    @keyframes flash-love { 0% { background-color: var(--color-love); } 100% { background-color: var(--bg); } }
    @keyframes flash-all { 0% { background-color: var(--color-melancholy-love); } 100% { background-color: var(--bg); } }
    
    .fx-flash-melancholy { animation: flash-melancholy 0.4s ease-out; }
    .fx-flash-love { animation: flash-love 0.4s ease-out; }
    .fx-flash-all { animation: flash-all 0.4s ease-out; }

    /* CARDS & GRIDS */
    .card { background: #fff; border: var(--border); box-shadow: var(--shadow); padding: 15px; margin-bottom: 20px; position: relative; }
    .section-title { font-size: 1.3rem; margin-bottom: 15px; background: var(--primary); color: var(--white); display: inline-block; padding: 5px 15px; border: var(--border); transform: rotate(-2deg); box-shadow: 2px 2px 0 #000; transition: 0.3s;}
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; align-items: start; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    
    .item-card { text-align: center; cursor: pointer; transition: transform 0.1s; background: #fff; border: var(--border); padding: 8px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 6px; position: relative; }
    .item-card:active { transform: translate(3px, 3px); box-shadow: none; }
    .item-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: var(--border-dashed); background: #fff; display: block; transition: 0.3s; }
    .item-name { font-weight: 900; font-size: 0.8rem; line-height: 1.2; text-transform: uppercase; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    /* HERO BANNER */
    .hero { position: relative; height: 350px; border: var(--border); box-shadow: var(--shadow); margin-bottom: 30px; overflow: hidden; background: #000; color: #fff; cursor: pointer; transition: transform 0.2s;}
    .hero:active { transform: translate(3px, 3px); box-shadow: none; }
    .hero-media { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; z-index: 1; pointer-events: none; filter: contrast(120%);}
    .hero-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,1), transparent); pointer-events: none; }
    .tag { background: var(--primary); color: var(--white); font-weight: 900; font-size: 0.7rem; padding: 4px 10px; display: inline-block; margin-bottom: 8px; border: 2px solid #000; transition: 0.3s;}

    /* BOTOES E FILTROS (TAGS) */
    .tags-container { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
    .tags-container::-webkit-scrollbar { display: none; }
    .btn-tag { flex: 1; min-width: max-content; padding: 10px 15px; border: var(--border-dashed); background: #fff; font-weight: 900; font-size: 0.75rem; cursor: pointer; box-shadow: var(--shadow-sm); text-transform: uppercase; transition: 0.2s;}
    
    .btn-tag.tag-all.active { background: var(--color-melancholy-love); color: #000; border: var(--border); }
    .btn-tag.tag-melancholy.active { background: var(--color-melancholy); color: #fff; border: var(--border); }
    .btn-tag.tag-love.active { background: var(--color-love); color: #fff; border: var(--border); }

    /* MODAIS */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
    .modal-overlay.active { display: flex; animation: fadeModal 0.2s forwards; }
    @keyframes fadeModal { from{opacity:0;} to{opacity:1;} }
    .modal-content { background: var(--bg); width: 100%; max-width: 600px; height: 92vh; border: var(--border); border-bottom: none; overflow-y: auto; position: relative; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); transition: background-color 0.3s;}
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .close-btn { position: absolute; top: 15px; right: 15px; background: var(--primary); color: #fff; border: var(--border); width: 35px; height: 35px; z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; box-shadow: 2px 2px 0 #000; transition: 0.3s;}

    /* ABAS INTERNAS DOS MODAIS */
    .tabs { display: flex; border-bottom: var(--border); background: var(--black); position: sticky; top: 0; z-index: 5; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: 900; font-size: 0.8rem; color: #888; cursor: pointer; text-transform: uppercase; border-bottom: 5px solid transparent; transition: 0.3s;}
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-pane, .modal-section { display: none; padding: 20px; }
    .tab-pane.active, .modal-section.active { display: block; }

    /* MENU INFERIOR */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: var(--white); display: flex; border-top: var(--border); z-index: 1000; }
    .nav-item { flex: 1; border: none; border-right: 2px solid #000; background: none; color: #000; font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.1s;}
    .nav-item:last-child { border-right: none; }
    .nav-item.active { background: var(--primary); color: #fff; transition: background 0.3s;}
    .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
    .nav-item.active.black-text { color: #000; }

    /* BLINDAGEM DE IMAGEM PARA SHOWS */
    .stage-card { background: #fff; border: var(--border); padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; box-shadow: var(--shadow); cursor: pointer;}
    .stage-card:active { transform: translate(3px, 3px); box-shadow: none; }
    .stage-cover { width: 80px; min-width: 80px; height: 80px; border: var(--border-dashed); object-fit: cover; background: var(--black); }
    .stage-info { flex: 1; }
    .stage-title { font-weight: 900; font-size: 1rem; text-transform: uppercase; line-height: 1.1; }
    .stage-sub { font-size: 0.7rem; font-weight: 700; color: #666; margin-top: 4px; }
    .stage-badge { font-size: 0.6rem; padding: 4px 8px; background: var(--primary); color: #000; font-weight: 900; display: inline-block; margin-top: 6px; border: 2px solid #000; }

    /* --- ESTILOS EXCLUSIVOS DO MODO ADMIN --- */
    .admin-only { display: none; }
    .admin-mode .admin-only { display: block; }
    
    .btn-toggle-admin { background: #000; color: #fff; border: 2px solid var(--primary); padding: 5px 10px; font-weight: 900; cursor: pointer; display: flex; gap: 5px; align-items: center; font-size: 0.7rem; border-radius: 5px; transition: 0.3s;}
    .admin-mode .btn-toggle-admin { background: #00FF00; color: #000; border-color: #000; box-shadow: 2px 2px 0 #000;}

    .admin-edit-btn { display: none; position: absolute; top: -10px; right: -10px; background: #FFFF00; color: #000; border: 2px solid #000; width: 35px; height: 35px; border-radius: 50%; font-size: 1rem; cursor: pointer; box-shadow: 2px 2px 0 #000; z-index: 10; align-items: center; justify-content: center; transition: transform 0.1s;}
    .admin-edit-btn:active { transform: scale(0.9); }
    .admin-mode .admin-edit-btn { display: flex; }

    .admin-add-btn { background: #00FF00; color: #000; border: var(--border); padding: 12px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; cursor: pointer; box-shadow: var(--shadow-sm); width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem; transition: 0.1s;}
    .admin-add-btn:active { transform: translate(2px, 2px); box-shadow: none; }

    .admin-form { padding: 20px; padding-top: 60px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: var(--border); box-shadow: 2px 2px 0 #000; font-family: 'Roboto'; font-size: 0.9rem; }
    .form-group textarea { resize: vertical; min-height: 100px;}
    .help-text { font-size: 0.7rem; color: #555; margin-top: 5px; font-weight: bold; }
    
    .btn-save { background: var(--primary); color: #fff; border: var(--border); padding: 15px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: var(--shadow); margin-top: 10px; font-size: 1rem; transition: 0.1s;}
    .btn-save:active { transform: translate(3px, 3px); box-shadow: none; }
    .btn-delete { background: #E60000; color: #fff; border: var(--border); padding: 15px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.1s;}

    /* CONSTRUTORES VISUAIS */
    .builder-container { background: #fff; border: var(--border); padding: 10px; box-shadow: var(--shadow-sm); }
    .builder-row { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; align-items: stretch; background: var(--bg); padding: 5px; border: 2px dashed #000;}
    .builder-row input, .builder-row select { flex: 1; padding: 8px; font-size: 0.8rem; border: 2px solid #000; box-shadow: none; min-width: 100px; margin:0;}
    .btn-builder-del { background: #E60000; color: #fff; border: 2px solid #000; padding: 0 12px; cursor: pointer; font-weight: bold; font-size: 1rem;}
    .btn-builder-add { width: 100%; padding: 10px; background: #000; color: var(--primary); border: none; font-weight: 900; cursor: pointer; margin-top: 5px; text-transform: uppercase; font-size: 0.8rem; box-shadow: 2px 2px 0 var(--primary);}

    .member-pill-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding: 10px; background: #fff; border: 2px dashed #000; width: 100%; }
    .m-pill { display: inline-flex; align-items: stretch; border: 2px solid #000; background: #eee; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; transition: 0.2s; box-shadow: 2px 2px 0 #000;}
    .m-pill.is-active { background: var(--primary); color: #000; }
    .m-pill-name { padding: 6px 10px; cursor: pointer; display: flex; align-items: center;}
    .m-pill-center { padding: 6px 10px; border-left: 2px solid #000; color: #999; cursor: pointer; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.05); transition: 0.2s;}
    .m-pill-center:hover { color: #000; }
    .m-pill.is-active .m-pill-center { color: #fff; }
    .m-pill.is-active .m-pill-center.is-center { color: #FFD700; background: #000; border-left-color: #000;}
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">MELANCHOLY<span>LOVE <i class="fas fa-heart"></i></span></div>
    <button class="btn-toggle-admin" onclick="toggleAdminMode()"><i class="fas fa-cog"></i> ADMIN</button>
  </div>

  <div id="view-home" class="view-section active container">
    <div class="hero" id="hero-container">
      <button class="admin-edit-btn admin-only" onclick="openAdminModal('banner', 0, event)" style="top: 10px; right: 10px;"><i class="fas fa-pen"></i></button>
      <div id="hero-media-wrapper"></div>
      <div class="hero-content">
        <span class="tag" id="hero-tag">...</span>
        <h1 id="hero-title" class="font-head" style="font-size: 1.5rem; line-height: 1.1;">...</h1>
        <p id="hero-sub" style="font-size: 0.8rem; font-weight: 700; opacity: 0.9;">...</p>
      </div>
    </div>
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <h3 class="section-title" style="margin:0;">Últimas Notícias <i class="fas fa-newspaper"></i></h3>
    </div>
    <button class="admin-add-btn admin-only" onclick="openAdminModal('news', -1)"><i class="fas fa-plus"></i> Adicionar Notícia</button>
    <div id="news-list"></div>
  </div>

  <div id="view-disco" class="view-section container">
    <h3 class="section-title">Discografia <i class="fas fa-compact-disc"></i></h3>
    <button class="admin-add-btn admin-only" onclick="openAdminModal('disco', -1)"><i class="fas fa-plus"></i> Adicionar Single/Álbum</button>
    <div id="disco-grid" class="grid-2"></div>
  </div>

  <div id="view-members" class="view-section container">
    <h3 class="section-title">Membros <i class="fas fa-skull"></i></h3>
    <button class="admin-add-btn admin-only" onclick="openAdminModal('member', -1)"><i class="fas fa-plus"></i> Adicionar Membro</button>
    <div class="tags-container">
      <button class="btn-tag tag-all active" onclick="setUnitFilter('All', this)">Melancholy Love <i class="fas fa-heart"></i></button>
      <button class="btn-tag tag-melancholy" onclick="setUnitFilter('Melancholy', this)">Melancholy <i class="fas fa-skull"></i></button>
      <button class="btn-tag tag-love" onclick="setUnitFilter('Love', this)">Love <i class="fas fa-heart"></i></button>
    </div>
    <div id="members-container"></div>
  </div>

  <div id="view-stages" class="view-section container">
    <h3 class="section-title">Shows <i class="fas fa-guitar"></i></h3>
    <button class="admin-add-btn admin-only" onclick="openAdminModal('stage', -1)"><i class="fas fa-plus"></i> Adicionar Show</button>
    <div id="stages-list"></div>
  </div>

  <div id="admin-modal" class="modal-overlay" onclick="if(event.target==this)closeModal('admin-modal')">
    <div class="modal-content" style="background: #fff;">
      <button class="close-btn" onclick="closeModal('admin-modal')"><i class="fas fa-times"></i></button>
      <div id="admin-form-container" class="admin-form"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active black-text" onclick="switchView('view-home', this)"><i class="fas fa-skull"></i>Início</button>
    <button class="nav-item" onclick="switchView('view-disco', this)"><i class="fas fa-compact-disc"></i>Discos</button>
    <button class="nav-item" onclick="switchView('view-members', this)"><i class="fas fa-users"></i>Membros</button>
    <button class="nav-item" onclick="switchView('view-stages', this)"><i class="fas fa-microphone-alt"></i>Shows</button>
  </div>

  <script>
    // --- SUPABASE SETUP ---
    var supaUrl = 'https://cotzdfxjazojpwpmkoss.supabase.co';
    var supaKey = 'sb_publishable_vF3JVZw3vDrfLM5M6xtw_w_0VJh7uwm';
    var db = window.supabase.createClient(supaUrl, supaKey);

    // --- GLOBALS & MOCK DATA (FALLBACK) ---
    var pImg = (name, unit) => {
        let hexCol = 'FF69B4'; 
        if (unit === 'Melancholy') hexCol = '8A2BE2'; 
        else if (unit === 'Love') hexCol = 'E60000'; 
        let cleanName = name.replace(/<[^>]*>?/gm, '').trim().substring(0,3).toUpperCase();
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(cleanName)}&background=${hexCol}&color=111&size=200&font-size=0.33&bold=true`;
    };

    var loadedMembers = [{ id:1, Nome: "Yua", Geracao: "1ª Geração", Foto: pImg("YUA", "Love"), SubUnit: "Love", Status: "Ativa", Perfil: "Mock Member", Historico_Times: "[]", Participacoes: "[]" }];
    var loadedDiscos = [ { id:1, Titulo: "Bleeding Love", Tipo: "1st Single", Capa: pImg("BLD", "All"), Tracklist: "[]" } ];
    var loadedStages = [];
    var loadedNews = [ { id:1, Data: "2024-10-31", Categoria: "SISTEMA", Titulo: "Aguardando Banco de Dados" } ];
    var loadedBanner = { url_midia: 'https://i.ibb.co/bM4DYRtR/Chat-GPT-Image-8-de-abr-de-2026-16-50-31.png', titulo: 'BEM-VINDO ADMIN', subtitulo: 'Configure seu banco', tag: 'ADMIN' };
    
    var currentUnitFilter = 'All';
    var isAdminMode = false;
    var editType = '';
    var editIndex = -1;
    var tempHist = [], tempPart = [], tempTrack = [];

    // --- INIT ---
    async function init() {
        try {
            const [memRes, discRes, newsRes, stageRes, banRes] = await Promise.all([
                db.from('members').select('*').order('created_at', { ascending: true }),
                db.from('discos').select('*').order('created_at', { ascending: false }),
                db.from('news').select('*').order('data', { ascending: false }),
                db.from('stages').select('*').order('created_at', { ascending: false }),
                db.from('banner').select('*').eq('id', 1).single()
            ]);

            if(memRes.data) loadedMembers = memRes.data.map(m => ({ id: m.id, Nome: m.nome, Geracao: m.geracao, Foto: m.foto, SubUnit: m.subunit, Status: m.status, Perfil: m.perfil, Historico_Times: typeof m.historico_times === 'string' ? m.historico_times : JSON.stringify(m.historico_times || []), Participacoes: typeof m.participacoes === 'string' ? m.participacoes : JSON.stringify(m.participacoes || []) }));
            if(discRes.data) loadedDiscos = discRes.data.map(d => ({ id: d.id, Titulo: d.titulo, Tipo: d.tipo, Capa: d.capa, Tracklist: typeof d.tracklist === 'string' ? d.tracklist : JSON.stringify(d.tracklist || []) }));
            if(newsRes.data) loadedNews = newsRes.data.map(n => ({ id: n.id, Data: n.data, Categoria: n.categoria, Titulo: n.titulo }));
            if(stageRes.data) loadedStages = stageRes.data.map(s => ({ id: s.id, Titulo: s.titulo, Subtitulo: s.subtitulo, Status: s.status, Capa: s.capa, Setlist: s.setlist }));
            if(banRes.data) loadedBanner = banRes.data;

        } catch(e) { console.warn("Falha no DB (Tabelas faltantes ou RLS). Usando Mocks.", e); } finally { renderAll(); }
    }

    function renderAll() { renderDynamicHero(); renderNews(); renderDisco(); renderMembers(); renderStagesList(); }
    function toggleAdminMode() { isAdminMode = !isAdminMode; document.body.classList.toggle('admin-mode', isAdminMode); }

    function switchView(id, el) { 
      document.querySelectorAll(".view-section").forEach(v => v.classList.remove("active")); 
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active")); 
      document.getElementById(id).classList.add("active"); el.classList.add("active"); window.scrollTo(0,0); 
    }

    function renderDynamicHero() { 
        if(!loadedBanner) return; 
        document.getElementById("hero-title").innerHTML = loadedBanner.titulo; document.getElementById("hero-sub").innerHTML = loadedBanner.subtitulo; 
        document.getElementById("hero-tag").innerHTML = loadedBanner.tag; document.getElementById("hero-media-wrapper").innerHTML = `<img class="hero-media" src="${loadedBanner.url_midia}">`; 
    }

    function renderNews() { 
        document.getElementById("news-list").innerHTML = loadedNews.map((n, i) => { 
            const d = (n.Data || "0000-00-00").split("-"); 
            return `<div class="card" style="display:flex; align-items:center; gap:15px;">
                <button class="admin-edit-btn admin-only" onclick="openAdminModal('news', ${i})"><i class="fas fa-pen"></i></button>
                <div style="text-align:center; min-width:50px; border-right:3px dashed #000; padding-right:15px;"><b style="font-size:1.5rem; color:var(--primary); -webkit-text-stroke:1px #000;">${d[2]||'00'}</b><br><span style="font-size:0.7rem; font-weight:900;">${d[1]||'00'}/${d[0]||'00'}</span></div>
                <div><span class="tag" style="font-size:0.6rem; padding:2px 5px;">${n.Categoria}</span><h4 style="font-size:0.9rem; text-transform:uppercase;">${n.Titulo}</h4></div>
            </div>`; 
        }).join(''); 
    }

    function getCenterUnitColor(d) {
        let themeColor = 'var(--black)';
        if (!d || !d.Tracklist) return themeColor;
        let fJSON = null;
        if (typeof d.Tracklist === 'string') {
            if (d.Tracklist.includes('ctl48-formation-data')) {
                const temp = document.createElement("div"); temp.innerHTML = d.Tracklist; 
                const jsonEl = temp.querySelector("#ctl48-formation-data"); 
                if(jsonEl) { try { fJSON = JSON.parse(jsonEl.textContent.trim()); } catch(e){} }
            } else { try { fJSON = JSON.parse(d.Tracklist); } catch(e){} }
        } else fJSON = d.Tracklist;

        if (fJSON && Array.isArray(fJSON)) {
            const aSide = fJSON.find(t => t.kind && (t.kind.includes('A-Side') || t.kind.includes('aside')));
            if (aSide && aSide.members) {
              const centerMember = aSide.members.find(m => m.isCenter);
              if (centerMember) {
                const cleanCenter = centerMember.name.replace(/<[^>]*>?/gm, '').trim();
                const realMember = loadedMembers.find(x => x.Nome.replace(/<[^>]*>?/gm, '').trim() === cleanCenter);
                if (realMember) {
                  if (realMember.SubUnit === 'Melancholy') themeColor = 'var(--color-melancholy)';
                  else if (realMember.SubUnit === 'Love') themeColor = 'var(--color-love)';
                  else themeColor = 'var(--color-melancholy-love)';
                }
              }
            }
        }
        return themeColor;
    }

    function renderDisco() { 
      document.getElementById("disco-grid").innerHTML = loadedDiscos.map((d, i) => {
        let themeColor = getCenterUnitColor(d);
        if (themeColor === 'var(--black)') themeColor = 'transparent';
        return `<div class="item-card" onclick="if(!isAdminMode) alert('Ative o modo Admin no botão acima para editar!')">
          <button class="admin-edit-btn admin-only" onclick="openAdminModal('disco', ${i}, event)"><i class="fas fa-pen"></i></button>
          <img src="${d.Capa || pImg(d.Titulo, 'All')}" style="border-color: ${themeColor}; border-style: ${themeColor !== 'transparent' ? 'solid' : 'dashed'}; border-width: 3px;">
          <div class="item-name">${d.Titulo}</div>
        </div>`;
      }).join(''); 
    }

    function setUnitFilter(unit, btn) {
      currentUnitFilter = unit; document.querySelectorAll(".btn-tag").forEach(b => b.classList.remove("active"));
      if(btn) btn.classList.add("active"); 
      
      const root = document.documentElement;
      if(unit === 'Melancholy') {
          root.style.setProperty('--primary', 'var(--color-melancholy)'); root.style.setProperty('--primary-light', '#D8BFD8'); 
          document.body.classList.remove('fx-flash-love', 'fx-flash-melancholy', 'fx-flash-all'); void document.body.offsetWidth; 
          document.body.classList.add('fx-flash-melancholy');
      } else if (unit === 'Love') {
          root.style.setProperty('--primary', 'var(--color-love)'); root.style.setProperty('--primary-light', '#FFCCCC'); 
          document.body.classList.remove('fx-flash-love', 'fx-flash-melancholy', 'fx-flash-all'); void document.body.offsetWidth;
          document.body.classList.add('fx-flash-love');
      } else {
          root.style.setProperty('--primary', 'var(--color-melancholy-love)'); root.style.setProperty('--primary-light', '#FFB6C1'); 
          document.body.classList.remove('fx-flash-love', 'fx-flash-melancholy', 'fx-flash-all'); void document.body.offsetWidth;
          document.body.classList.add('fx-flash-all');
      }
      
      document.querySelectorAll(".nav-item").forEach(n => unit==='All' ? n.classList.add("black-text") : n.classList.remove("black-text"));
      renderMembers();
    }

    function renderMembers() { 
      const container = document.getElementById("members-container"); container.innerHTML = ""; 
      const groups = {}; 
      loadedMembers.forEach((m, index) => { 
        m._originalIndex = index; const key = currentUnitFilter === 'All' ? (m.Geracao || "1ª Geração") : (m.SubUnit || "Outros"); 
        if(currentUnitFilter !== 'All' && key !== currentUnitFilter) return;
        if(!groups[key]) groups[key] = []; groups[key].push(m); 
      }); 
      
      const orderMap = {"1ª Geração": 0, "2ª Geração": 1, "Love": 2, "Melancholy": 3};
      Object.keys(groups).sort((a, b) => (orderMap[a] || 99) - (orderMap[b] || 99)).forEach(key => { 
        let themeColor = key === 'Melancholy' ? 'var(--color-melancholy)' : (key === 'Love' ? 'var(--color-love)' : (currentUnitFilter==='All' ? 'var(--black)' : 'var(--primary)'));
        let textColor = currentUnitFilter==='All' ? 'var(--color-melancholy-love)' : '#fff';
        let sectionTitle = `<i class="fas fa-star"></i> ${key}`;
        if (key === 'Melancholy' || key === 'Love') sectionTitle = `SUB UNIT: ${key}`;
        
        container.innerHTML += `<div>
          <h4 class="section-title" style="margin-top:20px; background:${themeColor}; color:${textColor};">${sectionTitle}</h4>
          <div class="grid-3">
            ${groups[key].map(m => `<div class="item-card" onclick="if(!isAdminMode) alert('Ative o modo Admin no botão acima para editar!')">
              <button class="admin-edit-btn admin-only" onclick="openAdminModal('member', ${m._originalIndex}, event)"><i class="fas fa-pen"></i></button>
              <img src="${m.Foto || pImg(m.Nome, m.SubUnit)}" style="border-color:${themeColor}">
              <div class="item-name">${m.Nome}</div>
            </div>`).join('')}
          </div>
        </div>`; 
      }); 
    }

    function renderStagesList() { 
        document.getElementById('stages-list').innerHTML = loadedStages.map((s, i) => `<div class="stage-card" onclick="if(!isAdminMode) alert('Ative o modo Admin no botão acima para editar!')">
            <button class="admin-edit-btn admin-only" onclick="openAdminModal('stage', ${i}, event)"><i class="fas fa-pen"></i></button>
            <img src="${s.Capa || pImg('STG','All')}" class="stage-cover">
            <div class="stage-info"><div class="stage-title">${s.Titulo}</div><div class="stage-sub">${s.Subtitulo || ''}</div><span class="stage-badge">${s.Status || 'Confirmado'}</span></div>
        </div>`).join(''); 
    }

    function closeModal(id) { document.getElementById(id).classList.remove("active"); }

    // --- BUILDER HISTÓRICO ATUALIZADO (Mês dropdown, Ano input, Acontecimento Misto) ---
    function updHist(idx, field, val) { tempHist[idx][field] = val; }
    function delHist(idx) { tempHist.splice(idx,1); renderHistBuilder(); }
    function addHist() { tempHist.push({mes:'Jan', ano:'', acao:'', desc:''}); renderHistBuilder(); }
    
    function renderHistBuilder() {
        let html = '';
        const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const acoes = ['Debut', 'Entrou para Unit', 'Foi Transferida', 'Graduou', 'Foi Expulsa', 'Entrou em Hiatus', 'Retornou de Hiatus', 'Outro'];

        tempHist.forEach((h, i) => {
            // Se for dado legado (data e para), converte pro novo formato
            if (h.data !== undefined) {
                let p = h.data.split(' '); h.mes = p[0] || 'Jan'; h.ano = p[1] || ''; h.acao = 'Outro'; h.desc = h.para; delete h.data; delete h.para;
            }

            let showDesc = h.acao === 'Outro' || h.acao === 'Entrou para Unit' || h.acao === 'Foi Transferida';

            html += `<div class="builder-row" style="flex-direction:column; gap:8px;">
                <div style="display:flex; gap:5px; width:100%;">
                    <select onchange="updHist(${i}, 'mes', this.value)" style="flex:0.3;">
                        ${meses.map(m => `<option value="${m}" ${h.mes === m ? 'selected' : ''}>${m}</option>`).join('')}
                    </select>
                    <input type="number" placeholder="Ano (Ex: 2024)" value="${h.ano||''}" oninput="updHist(${i}, 'ano', this.value)" style="flex:0.3;">
                    <select onchange="updHist(${i}, 'acao', this.value); renderHistBuilder();" style="flex:0.8;">
                        ${acoes.map(a => `<option value="${a}" ${h.acao === a ? 'selected' : ''}>${a}</option>`).join('')}
                    </select>
                    <button class="btn-builder-del" onclick="delHist(${i})"><i class="fas fa-trash"></i></button>
                </div>
                ${showDesc ? `<input type="text" placeholder="Detalhes (Qual unit? Motivo?)" value="${h.desc||''}" oninput="updHist(${i}, 'desc', this.value)" style="width:100%;">` : ''}
            </div>`;
        });
        html += `<button class="btn-builder-add" onclick="addHist()">+ Adicionar Fato Histórico</button>`;
        document.getElementById('bld-hist').innerHTML = html;
    }

    function updPart(idx, field, val) { tempPart[idx][field] = val; }
    function delPart(idx) { tempPart.splice(idx,1); renderPartBuilder(); }
    function addPart() { tempPart.push({single:'', title:'', labels:''}); renderPartBuilder(); }
    function renderPartBuilder() {
        let html = '<div class="help-text" style="margin-bottom:10px;">Elas serão agrupadas pelo nome do Single ao salvar! Etiquetas: separe por vírgula.</div>';
        tempPart.forEach((p, i) => {
            html += `<div class="builder-row">
                <input type="text" placeholder="Single" value="${p.single||''}" oninput="updPart(${i}, 'single', this.value)">
                <input type="text" placeholder="Música" value="${p.title||''}" oninput="updPart(${i}, 'title', this.value)">
                <input type="text" placeholder="Tags (A-Side, Center...)" value="${p.labels||''}" oninput="updPart(${i}, 'labels', this.value)" style="flex: 100%;">
                <button class="btn-builder-del" style="flex: 100%; padding:5px;" onclick="delPart(${i})"><i class="fas fa-trash"></i> Remover</button>
            </div>`;
        });
        html += `<button class="btn-builder-add" onclick="addPart()">+ Adicionar Música</button>`;
        document.getElementById('bld-part').innerHTML = html;
    }

    function updTrack(idx, field, val) { tempTrack[idx][field] = val; }
    function delTrack(idx) { tempTrack.splice(idx,1); renderTrackBuilder(); }
    function addTrack() { tempTrack.push({kind:'A-Side', name:'', members: []}); renderTrackBuilder(); }
    function toggleTrackMember(tIdx, memberIndex) {
        const activeMembers = loadedMembers.filter(m => !['graduada','demitida'].includes(m.Status?.toLowerCase()));
        let mName = activeMembers[memberIndex].Nome; let track = tempTrack[tIdx]; if (!track.members) track.members = [];
        let existingIndex = track.members.findIndex(m => m.name === mName);
        if (existingIndex >= 0) track.members.splice(existingIndex, 1); else track.members.push({ name: mName, isCenter: false });
        renderTrackBuilder();
    }
    function setTrackCenter(tIdx, memberIndex, event) {
        event.stopPropagation(); const activeMembers = loadedMembers.filter(m => !['graduada','demitida'].includes(m.Status?.toLowerCase()));
        let mName = activeMembers[memberIndex].Nome; let track = tempTrack[tIdx]; if (!track.members) track.members = [];
        let member = track.members.find(m => m.name === mName);
        if (!member) { member = { name: mName, isCenter: true }; track.members.push(member); } else { member.isCenter = !member.isCenter; }
        renderTrackBuilder();
    }
    function renderTrackBuilder() {
        let html = '<div class="help-text" style="margin-bottom:10px;">Clique no nome para adicionar/remover. Clique na <i class="fas fa-star"></i> para Center.</div>';
        const activeMembers = loadedMembers.filter(m => !['graduada','demitida'].includes(m.Status?.toLowerCase()));
        tempTrack.forEach((t, i) => {
            html += `<div class="builder-row" style="flex-direction: column;">
                <div style="display:flex; gap:5px; width: 100%;">
                    <input type="text" placeholder="Tipo" value="${t.kind||''}" oninput="updTrack(${i}, 'kind', this.value)" style="flex:0.5;">
                    <input type="text" placeholder="Nome da Música" value="${t.name||''}" oninput="updTrack(${i}, 'name', this.value)">
                    <button class="btn-builder-del" onclick="delTrack(${i})"><i class="fas fa-trash"></i></button>
                </div>
                <div class="member-pill-wrap">`;
            activeMembers.forEach((m, mIdx) => {
                let cleanName = m.Nome.replace(/<[^>]*>?/gm, '').trim(); let inTrack = (t.members || []).find(tm => tm.name === m.Nome);
                let isCenter = !!inTrack && inTrack.isCenter;
                html += `<div class="m-pill ${inTrack ? 'is-active' : ''}">
                    <div class="m-pill-name" onclick="toggleTrackMember(${i}, ${mIdx})">${cleanName}</div>
                    <div class="m-pill-center ${isCenter ? 'is-center' : ''}" onclick="setTrackCenter(${i}, ${mIdx}, event)"><i class="fas fa-star"></i></div>
                </div>`;
            });
            html += `</div></div>`;
        });
        html += `<button class="btn-builder-add" onclick="addTrack()">+ Adicionar Faixa</button>`;
        document.getElementById('bld-track').innerHTML = html;
    }

    function insertSetlist(text) {
        const el = document.getElementById('fm-setlist');
        if(el.value && !el.value.endsWith('\n')) el.value += '\n';
        el.value += text;
        el.focus();
    }

    function openAdminModal(type, index, event) {
        if(event) event.stopPropagation(); editType = type; editIndex = index;
        const container = document.getElementById('admin-form-container');
        let html = `<h2 style="margin-bottom:20px;">${index >= 0 ? 'Editar' : 'Adicionar'} ${type.toUpperCase()}</h2>`;
        
        if (type === 'banner') {
            let d = loadedBanner || {url_midia:'', tag:'', titulo:'', subtitulo:''};
            html += `<div class="form-group"><label>URL da Imagem</label><input type="text" id="fm-url" value="${d.url_midia||''}"></div>
                     <div class="form-group"><label>Tag Superior</label><input type="text" id="fm-tag" value='${d.tag||''}'></div>
                     <div class="form-group"><label>Título</label><input type="text" id="fm-title" value='${d.titulo||''}'></div>
                     <div class="form-group"><label>Subtítulo</label><input type="text" id="fm-sub" value="${d.subtitulo||''}"></div>`;
        } 
        else if (type === 'news') {
            let d = index >= 0 ? loadedNews[index] : {Data: "", Categoria: "", Titulo: ""};
            html += `<div class="form-group"><label>Data</label><input type="date" id="fm-data" value="${d.Data}"></div>
                     <div class="form-group"><label>Categoria</label><input type="text" id="fm-cat" value="${d.Categoria}"></div>
                     <div class="form-group"><label>Título</label><input type="text" id="fm-title" value="${d.Titulo}"></div>`;
        }
        else if (type === 'disco') {
            let d = index >= 0 ? loadedDiscos[index] : {Titulo: "", Tipo: "", Capa: "", Tracklist: "[]"};
            let rawT = []; 
            if (typeof d.Tracklist === 'string') {
                if (d.Tracklist.includes('ctl48-formation-data')) {
                    const temp = document.createElement("div"); temp.innerHTML = d.Tracklist; 
                    const jsonEl = temp.querySelector("#ctl48-formation-data"); 
                    if(jsonEl) { try { rawT = JSON.parse(jsonEl.textContent.trim()); } catch(e){} }
                } else { try { rawT = JSON.parse(d.Tracklist); } catch(e){} }
            } else { rawT = d.Tracklist || []; }

            tempTrack = (rawT||[]).map(t => ({ kind: t.kind, name: t.name, members: JSON.parse(JSON.stringify(t.members || [])) }));
            html += `<div class="form-group"><label>Título</label><input type="text" id="fm-title" value="${d.Titulo}"></div>
                     <div class="form-group"><label>Tipo</label><input type="text" id="fm-tipo" value="${d.Tipo}"></div>
                     <div class="form-group"><label>URL da Capa</label><input type="text" id="fm-capa" value="${d.Capa||''}"></div>
                     <div class="form-group"><label>Faixas & Formação</label><div id="bld-track" class="builder-container"></div></div>`;
        }
        else if (type === 'member') {
            let d = index >= 0 ? loadedMembers[index] : {Nome: "", Geracao: "1ª Geração", Foto: "", SubUnit: "Love", Status: "Ativa", Perfil: "", Historico_Times: "[]", Participacoes: "[]"};
            try { tempHist = typeof d.Historico_Times === 'string' ? JSON.parse(d.Historico_Times) : d.Historico_Times; } catch(e){ tempHist=[]; }
            tempPart = []; let rawP = []; try { rawP = typeof d.Participacoes === 'string' ? JSON.parse(d.Participacoes) : d.Participacoes; } catch(e){}
            (rawP||[]).forEach(p => {
                if(typeof p === 'string') tempPart.push({single: p, title:'', labels:''});
                else (p.tracks||[]).forEach(t => tempPart.push({ single: p.single||'', title: t.title||'', labels: (t.labels||[]).join(', ') }));
            });
            html += `<div class="form-group"><label>Nome (Aceita HTML)</label><input type="text" id="fm-nome" value="${d.Nome.replace(/"/g, '&quot;')}"></div>
                     <div class="form-group"><label>Geração</label><input type="text" id="fm-gen" value="${d.Geracao}"></div>
                     <div class="form-group"><label>Sub Unit</label><select id="fm-unit"><option value="Love" ${d.SubUnit==='Love'?'selected':''}>Love</option><option value="Melancholy" ${d.SubUnit==='Melancholy'?'selected':''}>Melancholy</option></select></div>
                     <div class="form-group"><label>Status</label><input type="text" id="fm-status" value="${d.Status}"></div>
                     <div class="form-group"><label>URL Foto</label><input type="text" id="fm-foto" value="${(d.Foto||'').includes('ui-avatars') ? '' : d.Foto}"></div>
                     <div class="form-group"><label>Perfil</label><textarea id="fm-perfil">${d.Perfil}</textarea></div>
                     <div class="form-group"><label>Histórico</label><div id="bld-hist" class="builder-container"></div></div>
                     <div class="form-group"><label>Músicas</label><div id="bld-part" class="builder-container"></div></div>`;
        }
        else if (type === 'stage') {
            let d = index >= 0 ? loadedStages[index] : {Titulo: "", Subtitulo: "", Status: "", Capa: "", Setlist: ""};
            html += `<div class="form-group"><label>Título</label><input type="text" id="fm-title" value="${d.Titulo}"></div>
                     <div class="form-group"><label>Subtítulo</label><input type="text" id="fm-sub" value="${d.Subtitulo}"></div>
                     <div class="form-group"><label>Status</label><input type="text" id="fm-status" value="${d.Status}"></div>
                     <div class="form-group"><label>URL da Capa</label><input type="text" id="fm-capa" value="${d.Capa||''}"></div>
                     <div class="form-group">
                        <label>Setlist</label>
                        <div style="display: flex; gap: 5px; margin-bottom: 8px; overflow-x: auto;">
                           <button type="button" style="background:#000; color:var(--primary); font-weight:900; border:2px solid var(--primary); padding:6px 12px; cursor:pointer;" onclick="insertSetlist('M01. ')">+ M (Música)</button>
                           <button type="button" style="background:var(--primary); color:#fff; font-weight:900; border:2px solid #000; padding:6px 12px; cursor:pointer;" onclick="insertSetlist('MC1. ')">+ MC</button>
                           <button type="button" style="background:#fff; color:#000; font-weight:900; border:2px dashed #000; padding:6px 12px; cursor:pointer;" onclick="insertSetlist('ENCORE\\n')">+ ENCORE</button>
                        </div>
                        <textarea id="fm-setlist">${d.Setlist||''}</textarea>
                     </div>`;
        }

        html += `<button class="btn-save" onclick="saveAdminForm()"><i class="fas fa-save"></i> Salvar na Nuvem</button>`;
        if (index >= 0 && type !== 'banner') html += `<button class="btn-delete" onclick="deleteAdminItem()"><i class="fas fa-trash"></i> Excluir</button>`;
        container.innerHTML = html; document.getElementById('admin-modal').classList.add('active');
        if(document.getElementById('bld-hist')) renderHistBuilder(); if(document.getElementById('bld-part')) renderPartBuilder(); if(document.getElementById('bld-track')) renderTrackBuilder();
    }

    async function saveAdminForm() {
        try {
            document.querySelector('.btn-save').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            if (editType === 'banner') {
                const obj = { url_midia: document.getElementById('fm-url').value, tag: document.getElementById('fm-tag').value, titulo: document.getElementById('fm-title').value, subtitulo: document.getElementById('fm-sub').value };
                await db.from('banner').update(obj).eq('id', 1);
            } 
            else if (editType === 'news') {
                let obj = { data: document.getElementById('fm-data').value, categoria: document.getElementById('fm-cat').value, titulo: document.getElementById('fm-title').value };
                if (editIndex >= 0) await db.from('news').update(obj).eq('id', loadedNews[editIndex].id); else await db.from('news').insert([obj]);
            }
            else if (editType === 'disco') {
                let obj = { titulo: document.getElementById('fm-title').value, tipo: document.getElementById('fm-tipo').value, capa: document.getElementById('fm-capa').value || pImg(document.getElementById('fm-title').value, "All"), tracklist: tempTrack };
                if (editIndex >= 0) await db.from('discos').update(obj).eq('id', loadedDiscos[editIndex].id); else await db.from('discos').insert([obj]);
            }
            else if (editType === 'member') {
                let groupedPart = {};
                tempPart.forEach(p => {
                    if(!p.single) return; if(!groupedPart[p.single]) groupedPart[p.single] = { single: p.single, tracks: [] };
                    if(p.title) groupedPart[p.single].tracks.push({ title: p.title, labels: (p.labels||'').split(',').map(s=>s.trim()).filter(s=>s) });
                });
                
                // Formata o histórico antes de salvar
                let formatHist = tempHist.map(h => {
                    let text = h.acao;
                    if (h.desc) text += `: ${h.desc}`;
                    return { data: `${h.mes} ${h.ano}`.trim(), para: text };
                }).filter(h => h.para !== 'Outro' && h.data !== '');

                let obj = {
                    nome: document.getElementById('fm-nome').value, geracao: document.getElementById('fm-gen').value, subunit: document.getElementById('fm-unit').value, 
                    status: document.getElementById('fm-status').value, foto: document.getElementById('fm-foto').value || pImg(document.getElementById('fm-nome').value, document.getElementById('fm-unit').value), 
                    perfil: document.getElementById('fm-perfil').value, historico_times: formatHist, participacoes: Object.values(groupedPart)
                };
                if (editIndex >= 0) await db.from('members').update(obj).eq('id', loadedMembers[editIndex].id); else await db.from('members').insert([obj]);
            }
            else if (editType === 'stage') {
                let obj = { titulo: document.getElementById('fm-title').value, subtitulo: document.getElementById('fm-sub').value, status: document.getElementById('fm-status').value, capa: document.getElementById('fm-capa').value || pImg("STG", "All"), setlist: document.getElementById('fm-setlist').value };
                if (editIndex >= 0) await db.from('stages').update(obj).eq('id', loadedStages[editIndex].id); else await db.from('stages').insert([obj]);
            }
            closeModal('admin-modal'); await init(); 
        } catch (e) {
            alert("Erro ao salvar! Veja no console (F12) se tem erro de permissão (RLS) no Supabase. Erro: " + e.message);
            document.querySelector('.btn-save').innerHTML = 'Tentar Novamente';
        }
    }

    async function deleteAdminItem() {
        if(!confirm("Tem certeza que deseja excluir? Isso não pode ser desfeito.")) return;
        try {
            if (editType === 'news') await db.from('news').delete().eq('id', loadedNews[editIndex].id);
            else if (editType === 'disco') await db.from('discos').delete().eq('id', loadedDiscos[editIndex].id);
            else if (editType === 'member') await db.from('members').delete().eq('id', loadedMembers[editIndex].id);
            else if (editType === 'stage') await db.from('stages').delete().eq('id', loadedStages[editIndex].id);
            closeModal('admin-modal'); await init();
        } catch (e) { alert("Erro ao excluir! " + e.message); }
    }

    init();
  </script>
</body>
</html>
