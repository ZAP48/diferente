<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify RPG - Hall da Fama</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> 
    <style>
        :root {
            --bg-color: #000000;
            --bg-gradient: linear-gradient(180deg, #121212 0%, #000000 100%);
            --card-bg: #181818;
            --card-hover: #282828;
            --text-main: #ffffff;
            --text-sec: #a7a7a7;
            --accent: #1db954;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #cd7f32;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #ffffff, #a7a7a7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--text-sec);
            margin-bottom: 40px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }
        
        /* SISTEMA DE ABAS */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-sec);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active {
            background: var(--text-main);
            color: #000;
        }

        /* GRID RECORDES */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 60px;
        }
        .record-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .record-card:hover { transform: translateY(-8px); background-color: var(--card-hover); }
        
        .export-btn {
            position: absolute; top: 16px; right: 16px;
            background: rgba(0, 0, 0, 0.5); border: none; color: var(--text-sec);
            cursor: pointer; width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .export-btn:hover { color: #000; background: var(--text-main); transform: scale(1.1); }

        .record-category { font-size: 11px; color: var(--text-sec); text-transform: uppercase; font-weight: 800; margin-bottom: 20px; letter-spacing: 1.5px; }
        .record-image { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; margin: 0 auto 20px; box-shadow: 0 12px 24px rgba(0,0,0,0.6); }
        .is-album .record-image { border-radius: 8px; }
        .record-title { font-size: 20px; font-weight: 800; margin: 0 0 6px 0; overflow: hidden; text-overflow: ellipsis; }
        .record-stats { font-size: 26px; font-weight: 900; color: var(--text-main); background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }

        /* CHARTS */
        .charts-container { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 32px; }
        .chart-section { background: var(--card-bg); border-radius: 16px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-section h3 { font-size: 20px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .ranking-item { display: flex; align-items: center; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .ranking-item:hover { background: rgba(255,255,255,0.1); }
        .ranking-rank { font-size: 16px; font-weight: 800; color: var(--text-sec); width: 36px; text-align: center; }
        .ranking-img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; margin-right: 16px; }
        .ranking-info { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .ranking-title { font-weight: 700; font-size: 15px; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ranking-streams { font-weight: 800; font-size: 13px; color: var(--text-main); text-align: right; }

        .hidden { display: none !important; }
        .loader { font-size: 20px; color: var(--accent); margin-top: 50px; text-align: center; font-weight: 700; }
        textarea { width: 100%; height: 400px; background: #111; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 10px; font-family: monospace; }
        .copy-all-btn { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>🏆 Hall da Fama</h1>
    <p class="subtitle">Os maiores recordes e rankings globais do Spotify RPG.</p>

    <div class="tabs hidden" id="tabsNav">
        <button class="tab-btn active" onclick="switchTab('geral')">Recordes Atuais</button>
        <button class="tab-btn" onclick="switchTab('top100')">Top 100 Global</button>
        <button class="tab-btn" onclick="switchTab('riaj')">Certificações</button>
        <button class="tab-btn" onclick="switchTab('texto')">Versão Texto</button>
    </div>

    <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i><br>Calculando recordes globais...</div>

    <div id="tabGeral" class="hidden" style="width: 100%; max-width: 1200px;">
        <div class="records-grid">
            <div class="record-card" id="cardTopArtist">
                <button onclick="exportarArte('cardTopArtist')" class="export-btn"><i class="fas fa-camera"></i></button>
                <div class="record-category">Artista #1</div>
                <img id="topArtistImg" src="" class="record-image">
                <h2 id="topArtistName" class="record-title">-</h2>
                <div id="topArtistStreams" class="record-stats">-</div>
            </div>
            <div class="record-card is-album" id="cardTopSong">
                <button onclick="exportarArte('cardTopSong')" class="export-btn"><i class="fas fa-camera"></i></button>
                <div class="record-category">Música #1</div>
                <img id="topSongImg" src="" class="record-image">
                <h2 id="topSongTitle" class="record-title">-</h2>
                <div id="topSongStreams" class="record-stats">-</div>
            </div>
            <div class="record-card is-album" id="cardTopAlbum">
                <button onclick="exportarArte('cardTopAlbum')" class="export-btn"><i class="fas fa-camera"></i></button>
                <div class="record-category">Álbum/EP #1</div>
                <img id="topAlbumImg" src="" class="record-image">
                <h2 id="topAlbumTitle" class="record-title">-</h2>
                <div id="topAlbumStreams" class="record-stats">-</div>
            </div>
        </div>
        
        <div class="charts-container">
            <div class="chart-section">
                <h3>Músicas (Top 10)</h3>
                <div id="top10SongsList" class="ranking-list"></div>
            </div>
            <div class="chart-section">
                <h3>Álbuns/EPs (Top 10)</h3>
                <div id="top10AlbumsList" class="ranking-list"></div>
            </div>
        </div>
    </div>

    <div id="tabTop100" class="hidden" style="width: 100%; max-width: 1200px;">
        <div class="charts-container">
            <div class="chart-section">
                <h3><i class="fas fa-music"></i> Top 100 Músicas</h3>
                <div id="top100SongsList" class="ranking-list"></div>
            </div>
            <div class="chart-section">
                <h3><i class="fas fa-compact-disc"></i> Top 100 Álbuns/EPs</h3>
                <div id="top100AlbumsList" class="ranking-list"></div>
            </div>
        </div>
    </div>

    <div id="tabRiaj" class="hidden" style="width: 100%; max-width: 800px;">
        <div class="chart-section">
            <h3 style="justify-content: center;">Certificações de Streaming</h3>
            <div id="riajSongsList" class="ranking-list"></div>
        </div>
    </div>

    <div id="tabTexto" class="hidden" style="width: 100%; max-width: 800px; text-align: center;">
        <button class="copy-all-btn" onclick="copiarTexto()">Copiar Rankings para WhatsApp/Discord</button>
        <textarea id="textoCopia" readonly></textarea>
    </div>

    <script>
        const SUPABASE_URL = 'https://avlgxwymwotffookkimg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_9uhuy6fpFduf-qsEXYf5wA_BDBB1OIZ'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function formatNumber(num) { return (num || 0).toLocaleString('pt-BR'); }
        
        function switchTab(tabId) {
            ['tabGeral', 'tabTop100', 'tabRiaj', 'tabTexto'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1)).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function getCertIcon(streams) {
            if (streams >= 500000000) return '💎';
            if (streams >= 100000000) return '💿';
            if (streams >= 50000000) return '📀';
            if (streams >= 30000000) return '⚪';
            return '';
        }

        async function loadData() {
            try {
                const { data: artists } = await supabaseClient.from('artists').select('*');
                const { data: songs } = await supabaseClient.from('songs').select('*').order('total_streams', { ascending: false });
                const { data: albums } = await supabaseClient.from('albums').select('*');
                const { data: singles } = await supabaseClient.from('singles').select('*');

                const allReleases = [...albums, ...singles];

                // 1. Processar Músicas
                const songsFinal = songs.map(s => {
                    const rel = allReleases.find(r => (s.album_ids && s.album_ids.includes(r.id)) || (s.single_ids && s.single_ids.includes(r.id)));
                    const artistNames = s.artist_ids.map(id => artists.find(a => a.id === id)?.name || "Desconhecido").join(', ');
                    return { ...s, artist_name: artistNames, cover: rel?.image_url || 'https://i.imgur.com/AD3MbBi.png' };
                });

                // 2. Processar Álbuns (Filtrando apenas a tabela de albums para o Top Álbuns)
                const albumsFinal = albums.map(a => {
                    const albumSongs = songsFinal.filter(s => s.album_ids && s.album_ids.includes(a.id));
                    const total = albumSongs.reduce((acc, s) => acc + (s.total_streams || 0), 0);
                    const artist = artists.find(art => art.id === a.artist_id)?.name || "Vários";
                    return { ...a, streams: total, artist_name: artist };
                }).sort((a, b) => b.streams - a.streams);

                // 3. Processar Artistas
                const artistsFinal = artists.map(a => {
                    const artistSongs = songsFinal.filter(s => s.artist_ids && s.artist_ids.includes(a.id));
                    const total = artistSongs.reduce((acc, s) => acc + (s.total_streams || 0), 0);
                    return { ...a, streams: total };
                }).sort((a, b) => b.streams - a.streams);

                // Renderizar Recordes #1
                document.getElementById('topArtistName').innerText = artistsFinal[0].name;
                document.getElementById('topArtistStreams').innerText = formatNumber(artistsFinal[0].streams);
                document.getElementById('topArtistImg').src = artistsFinal[0].image_url?.split('#')[0];

                document.getElementById('topSongTitle').innerText = songsFinal[0].title;
                document.getElementById('topSongStreams').innerText = formatNumber(songsFinal[0].total_streams);
                document.getElementById('topSongImg').src = songsFinal[0].cover;

                document.getElementById('topAlbumTitle').innerText = albumsFinal[0].title;
                document.getElementById('topAlbumStreams').innerText = formatNumber(albumsFinal[0].streams);
                document.getElementById('topAlbumImg').src = albumsFinal[0].image_url;

                // Renderizar Listas
                const renderList = (list, elementId, limit, isAlbum = false) => {
                    document.getElementById(elementId).innerHTML = list.slice(0, limit).map((item, i) => `
                        <div class="ranking-item">
                            <div class="ranking-rank">${i+1}</div>
                            <img src="${isAlbum ? item.image_url : item.cover}" class="ranking-img" style="${!isAlbum && 'border-radius:50%'}">
                            <div class="ranking-info">
                                <div class="ranking-title">${item.title || item.name} ${!isAlbum ? getCertIcon(item.total_streams) : ''}</div>
                                <div style="font-size:12px; color:#aaa">${item.artist_name || 'Catálogo'}</div>
                            </div>
                            <div class="ranking-streams">${formatNumber(item.total_streams || item.streams)}</div>
                        </div>
                    `).join('');
                };

                renderList(songsFinal, 'top10SongsList', 10);
                renderList(albumsFinal, 'top10AlbumsList', 10, true);
                renderList(songsFinal, 'top100SongsList', 100);
                renderList(albumsFinal, 'top100AlbumsList', 100, true);

                // RIAJ
                document.getElementById('riajSongsList').innerHTML = songsFinal.filter(s => s.total_streams >= 30000000).map(s => `
                    <div class="ranking-item">
                        <div class="ranking-rank" style="font-size:24px">${getCertIcon(s.total_streams)}</div>
                        <img src="${s.cover}" class="ranking-img">
                        <div class="ranking-info">
                            <div class="ranking-title">${s.title}</div>
                            <div style="font-size:12px; color:#aaa">${s.artist_name}</div>
                        </div>
                        <div class="ranking-streams">${formatNumber(s.total_streams)}</div>
                    </div>
                `).join('');

                // Gerar Texto
                let txt = "🏆 RECORDES GLOBAIS - SPOTIFY RPG\n\n";
                txt += `👑 Artista #1: ${artistsFinal[0].name} (${formatNumber(artistsFinal[0].streams)})\n`;
                txt += `🔥 Música #1: ${songsFinal[0].title} (${formatNumber(songsFinal[0].total_streams)})\n`;
                txt += `💿 Álbum #1: ${albumsFinal[0].title} (${formatNumber(albumsFinal[0].streams)})\n\n`;
                txt += "🔝 TOP 10 MÚSICAS:\n";
                songsFinal.slice(0,10).forEach((s,i) => txt += `${i+1}. ${s.title} - ${formatNumber(s.total_streams)} ${getCertIcon(s.total_streams)}\n`);
                document.getElementById('textoCopia').value = txt;

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('tabsNav').classList.remove('hidden');
                document.getElementById('tabGeral').classList.remove('hidden');

            } catch (e) { console.error(e); }
        }

        function exportarArte(id) {
            const card = document.getElementById(id);
            html2canvas(card, { useCORS: true, backgroundColor: '#181818' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'recorde.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function copiarTexto() {
            document.getElementById('textoCopia').select();
            document.execCommand('copy');
            alert("Copiado!");
        }

        window.onload = loadData;
    </script>
</body>
</html>
