<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify RPG - Recordes Oficiais</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-sec: #b3b3b3;
            --accent: #1db954;
            --gold: #FFD700;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: var(--text-sec);
            margin-bottom: 50px;
            text-align: center;
        }
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }
        .record-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }
        .record-card:hover {
            transform: translateY(-5px);
            background-color: #282828;
        }
        .trophy-icon {
            font-size: 40px;
            color: var(--gold);
            margin-bottom: 16px;
        }
        .record-category {
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .record-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .is-album .record-image {
            border-radius: 8px; /* Álbuns e músicas são quadrados */
        }
        .record-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .record-subtitle {
            font-size: 16px;
            color: var(--text-sec);
            margin: 0 0 16px 0;
        }
        .record-stats {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
        }
        .loader {
            font-size: 24px;
            color: var(--accent);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>🏆 Hall da Fama Oficial</h1>
    <p class="subtitle">Os recordes absolutos de streams de todos os tempos.</p>

    <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> Calculando recordes...</div>

    <div id="recordsContainer" class="records-grid" style="display: none;">
        
        <div class="record-card">
            <i class="fas fa-crown trophy-icon"></i>
            <div class="record-category">Artista Mais Ouvido</div>
            <img id="topArtistImg" src="" class="record-image" alt="Artista">
            <h2 id="topArtistName" class="record-title">-</h2>
            <p id="topArtistSubtitle" class="record-subtitle">Catálogo Completo</p>
            <div id="topArtistStreams" class="record-stats">-</div>
        </div>

        <div class="record-card is-album">
            <i class="fas fa-fire trophy-icon"></i>
            <div class="record-category">Faixa Mais Ouvida</div>
            <img id="topSongImg" src="" class="record-image" alt="Música">
            <h2 id="topSongTitle" class="record-title">-</h2>
            <p id="topSongArtist" class="record-subtitle">-</p>
            <div id="topSongStreams" class="record-stats">-</div>
        </div>

        <div class="record-card is-album">
            <i class="fas fa-compact-disc trophy-icon"></i>
            <div class="record-category">Maior Projeto (Álbum/EP)</div>
            <img id="topAlbumImg" src="" class="record-image" alt="Álbum">
            <h2 id="topAlbumTitle" class="record-title">-</h2>
            <p id="topAlbumArtist" class="record-subtitle">-</p>
            <div id="topAlbumStreams" class="record-stats">-</div>
        </div>

    </div>

    <script>
        // =====================================================================
        // COLOQUE SUAS CHAVES DO SUPABASE AQUI (as mesmas do site original)
        // =====================================================================
       const SUPABASE_URL = 'https://avlgxwymwotffookkimg.supabase.co'; 
const SUPABASE_ANON_KEY = 'sb_publishable_9uhuy6fpFduf-qsEXYf5wA_BDBB1OIZ'; 
const IMGBB_API_KEY = '81f7ca81cf22d739de576bd1dac7dcc2';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Função para formatar os números (ex: 1.500.000)
        const formatNumber = (num) => {
            return (num || 0).toLocaleString('pt-BR');
        };

        async function calculateRecords() {
            try {
                // 1. Buscar todos os dados necessários
                const [artistsRes, songsRes, albumsRes, singlesRes] = await Promise.all([
                    supabaseClient.from('artists').select('*'),
                    supabaseClient.from('songs').select('*'),
                    supabaseClient.from('albums').select('*'),
                    supabaseClient.from('singles').select('*')
                ]);

                const artists = artistsRes.data || [];
                const songs = songsRes.data || [];
                const releases = [...(albumsRes.data || []), ...(singlesRes.data || [])];

                // ----------------------------------------------------------------
                // RECORD 1: FAIXA MAIS OUVIDA
                // ----------------------------------------------------------------
                let topSong = null;
                let maxSongStreams = -1;

                songs.forEach(song => {
                    const streams = song.total_streams || 0;
                    if (streams > maxSongStreams) {
                        maxSongStreams = streams;
                        topSong = song;
                    }
                });

                if (topSong) {
                    document.getElementById('topSongTitle').textContent = topSong.title;
                    document.getElementById('topSongStreams').textContent = formatNumber(maxSongStreams);
                    
                    // Achar o artista da música
                    const mainArtist = artists.find(a => a.id === topSong.artist_ids[0]);
                    document.getElementById('topSongArtist').textContent = mainArtist ? mainArtist.name : 'Desconhecido';

                    // Achar a capa (procura nos álbuns ou singles)
                    let coverUrl = 'https://i.imgur.com/AD3MbBi.png'; // padrão
                    if (topSong.album_ids && topSong.album_ids.length > 0) {
                        const alb = releases.find(r => r.id === topSong.album_ids[0]);
                        if (alb && alb.image_url) coverUrl = alb.image_url;
                    } else if (topSong.single_ids && topSong.single_ids.length > 0) {
                        const sgl = releases.find(r => r.id === topSong.single_ids[0]);
                        if (sgl && sgl.image_url) coverUrl = sgl.image_url;
                    }
                    document.getElementById('topSongImg').src = coverUrl;
                }

                // ----------------------------------------------------------------
                // RECORD 2: ÁLBUM / EP MAIS OUVIDO
                // ----------------------------------------------------------------
                let topRelease = null;
                let maxReleaseStreams = -1;

                releases.forEach(release => {
                    // Encontrar todas as músicas que pertencem a este lançamento
                    const releaseSongs = songs.filter(s => 
                        (s.album_ids && s.album_ids.includes(release.id)) || 
                        (s.single_ids && s.single_ids.includes(release.id))
                    );
                    
                    // Somar os streams de todas as faixas do álbum
                    const totalStreams = releaseSongs.reduce((sum, s) => sum + (s.total_streams || 0), 0);
                    
                    if (totalStreams > maxReleaseStreams) {
                        maxReleaseStreams = totalStreams;
                        topRelease = release;
                    }
                });

                if (topRelease) {
                    document.getElementById('topAlbumTitle').textContent = topRelease.title;
                    document.getElementById('topAlbumStreams').textContent = formatNumber(maxReleaseStreams);
                    document.getElementById('topAlbumImg').src = topRelease.image_url || 'https://i.imgur.com/AD3MbBi.png';
                    
                    const mainArtist = artists.find(a => a.id === topRelease.artist_id);
                    document.getElementById('topAlbumArtist').textContent = mainArtist ? mainArtist.name : 'Desconhecido';
                }

                // ----------------------------------------------------------------
                // RECORD 3: ARTISTA COM MAIS STREAMS TOTAIS
                // ----------------------------------------------------------------
                let topArtist = null;
                let maxArtistStreams = -1;

                artists.forEach(artist => {
                    // Acha todas as músicas onde ele está envolvido (principal ou feat)
                    const artistSongs = songs.filter(s => s.artist_ids && s.artist_ids.includes(artist.id));
                    
                    // Soma tudo
                    const totalStreams = artistSongs.reduce((sum, s) => sum + (s.total_streams || 0), 0);

                    if (totalStreams > maxArtistStreams) {
                        maxArtistStreams = totalStreams;
                        topArtist = artist;
                    }
                });

                if (topArtist) {
                    document.getElementById('topArtistName').textContent = topArtist.name;
                    document.getElementById('topArtistStreams').textContent = formatNumber(maxArtistStreams);
                    
                    // Extrai a URL limpa da imagem do artista (tirando o #pos)
                    let cleanImgUrl = topArtist.image_url ? topArtist.image_url.split('#')[0] : 'https://i.imgur.com/AD3MbBi.png';
                    document.getElementById('topArtistImg').src = cleanImgUrl;
                    
                    // Posição da foto (se houver)
                    if (topArtist.image_url && topArtist.image_url.includes('#pos=')) {
                        const pos = topArtist.image_url.split('#pos=')[1];
                        document.getElementById('topArtistImg').style.objectPosition = `center ${pos}%`;
                    }
                }

                // Esconder ecrã de loading e mostrar os cards
                document.getElementById('loading').style.display = 'none';
                document.getElementById('recordsContainer').style.display = 'grid';

            } catch (error) {
                console.error("Erro ao carregar recordes:", error);
                document.getElementById('loading').innerHTML = '<span style="color: #ff4444;">Erro ao carregar dados da base de dados. Verifique as suas chaves do Supabase.</span>';
            }
        }

        // Inicia a busca ao abrir a página
        window.addEventListener('DOMContentLoaded', calculateRecords);
    </script>
</body>
</html>
