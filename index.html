<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify RPG - Recordes Oficiais</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-sec: #b3b3b3;
            --accent: #1db954;
            --gold: #FFD700;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: var(--text-sec);
            margin-bottom: 50px;
            text-align: center;
        }
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }
        .record-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }
        .record-card:hover {
            transform: translateY(-5px);
            background-color: #282828;
        }
        .trophy-icon {
            font-size: 40px;
            color: var(--gold);
            margin-bottom: 16px;
        }
        .record-category {
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .record-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .is-album .record-image {
            border-radius: 8px; /* Álbuns e músicas são quadrados */
        }
        .record-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .record-subtitle {
            font-size: 16px;
            color: var(--text-sec);
            margin: 0 0 16px 0;
        }
        .record-stats {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
        }
        .loader {
            font-size: 24px;
            color: var(--accent);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>🏆 Hall da Fama Oficial</h1>
    <p class="subtitle">Os recordes absolutos de streams de todos os tempos.</p>

    <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> Calculando recordes...</div>

    <div id="recordsContainer" class="records-grid" style="display: none;">
        
        <div class="record-card">
            <i class="fas fa-crown trophy-icon"></i>
            <div class="record-category">Artista Mais Ouvido</div>
            <img id="topArtistImg" src="" class="record-image" alt="Artista">
            <h2 id="topArtistName" class="record-title">-</h2>
            <p id="topArtistSubtitle" class="record-subtitle">Catálogo Completo</p>
            <div id="topArtistStreams" class="record-stats">-</div>
        </div>

        <div class="record-card is-album">
            <i class="fas fa-fire trophy-icon"></i>
            <div class="record-category">Faixa Mais Ouvida</div>
            <img id="topSongImg" src="" class="record-image" alt="Música">
            <h2 id="topSongTitle" class="record-title">-</h2>
            <p id="topSongArtist" class="record-subtitle">-</p>
            <div id="topSongStreams" class="record-stats">-</div>
        </div>

        <div class="record-card is-album">
            <i class="fas fa-compact-disc trophy-icon"></i>
            <div class="record-category">Maior Projeto (Álbum/EP)</div>
            <img id="topAlbumImg" src="" class="record-image" alt="Álbum">
            <h2 id="topAlbumTitle" class="record-title">-</h2>
            <p id="topAlbumArtist" class="record-subtitle">-</p>
            <div id="topAlbumStreams" class="record-stats">-</div>
        </div>

    </div>

    <script src="js/records.js"></script>
</body>
</html>
